<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.8.0/leaflet.css" />
    <script src="https://d3js.org/d3.v6.js"></script>
    <style>
        #map {
            width: auto;
            height: 500px;
        }

        .legend {
            line-height: 12px;
            color: #555;
        }

        .legend i {
            width: 50px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }

        .info {
            padding: 6px 8px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: white;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .info h4 {
            margin: 0 0 5px;
            color: #777;
        }
        .text-labels {
            font-size: 50px;
            font-weight: 700;
            color: white;
            /* Use color, background, set margins for offset, etc */
        }
    </style>
</head>

<body>
    <div>
        <div id="map"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.8.0/leaflet.js"></script>
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <script src="us-states-hexbin.js"></script>
    <script>
        let width = 800, height = 300;

        // The svg
        const svg = d3.select("svg").attr("viewBox", "0 0 " + width + " " + height);

        // Declare map backdrop
        var map = L.map('map').setView([35.8, -96.9], 4);

        var tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // // Map and projection
        // const projection = d3.geoMercator()
        //     .scale(350) // This is the zoom
        //     .translate([850, 440]); // You have to play with these values to center your map

        // Color Scale
        function getColorScale(d) {
            return d > 50 ? '#7A0177' :
                d > 45 ? '#C51B8A' :
                    d > 40 ? '#F768A1' :
                        d > 30 ? '#FA9FB5' :
                            d > 20 ? '#FCC5c0' :
                                '#FEEBE2';
        }

        // Fill Color to Cases
        function style(feature) {
            return {
                fillColor: getColorScale(feature.properties.cases),
                weight: 2,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.6
            };
        }

        var geojson;

        // Add Interaction Pop!
        function highlightFeature(e) {
            var layer = e.target;
            info.update(layer.feature.properties);

            layer.setStyle({
                weight: 4,
                color: 'skyblue',
                padding: '4px',
                fillOpacity: 0.6
            });


            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function resetHighlight(e) {
            geojson.resetStyle(e.target);
            info.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight,
            });
        }

        // Generate map
        geojson = L.geoJson(USstates_hexbin_datapoints, {
            style: style,
            onEachFeature: onEachFeature,
            icon: new L.DivIcon({
                className: 'my-div-icon',
                html: '<img class="my-div-image" src="http://png-3.vector.me/files/images/4/0/402272/aiga_air_transportation_bg_thumb"/>' +
                    '<span class="my-div-span">RAF Banff Airfield</span>'
            })
        }).addTo(map);

        // Adding Tooltip
        var info = L.control();

        info.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info'); // create a div with a class "info"
            this.update();
            return this._div;
        };

        // method that we will use to update the control based on feature properties passed
        info.update = function (props) {
            this._div.innerHTML = '<h4>Covid 19 Statistics - Adjusted for Population</h4>' + (props ?
                '<b>' + props.google_name + '</b><br />' + props.cases + ' Avg. Daily New Cases per 100k'
                : 'Hover over a state');
        };

        info.addTo(map);

        // Adding State Marker
        








        

        // Add Legend
        var legend = L.control({ position: 'bottomright' });

        legend.onAdd = function (map) {

            var div = L.DomUtil.create('div', 'info legend'),
                grades = [0, 20, 30, 40, 45, 50],
                labels = ['<strong><center>Newcases in Jul 22</center></strong><strong>(Rate per 100k Pop.)</strong><br>'];

            // loop through our density intervals and generate a label with a colored square for each interval
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    labels.push('<center><i class="circle" style="background:' + getColorScale(grades[i] + 1) + '"></i> ' +
                        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br></center>' : '+'));
            }

            div.innerHTML = labels.join('<br>');
            return div;
        };

        legend.addTo(map);
    </script>

</body>

</html>
