<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.8.0/leaflet.css" />
    <script src="https://d3js.org/d3.v6.js"></script>
    <style>
        #map {
            width: auto;
            height: 500px;
        }

        .legend {
            line-height: 12px;
            color: #555;
        }

        .legend i {
            width: 50px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }

        .info {
            padding: 6px 8px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: white;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .info h2 {
            margin: 0 0 5px;
            font-size: larger;
            font-weight: bolder;
            color: black;
        }

        .info h3 {
            font-weight: 900;
            color: yellow;
        }
        .text-labels {
            font-size: 50px;
            font-weight: 700;
            color: white;
            /* Use color, background, set margins for offset, etc */
        }
    </style>
</head>

<body>
    <div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <script src="us-states-hexbin.js"></script>
    <script>
        //console.log(USstates_hexbin_datapoints)

        // Translate Polygon
        function poly(x) {
            var feat = x
            // var poly = turf.polygon([[[0,29],[3.5,29],[2.5,32],[0,29]]]);
            var translatedPoly = turf.transformTranslate(x, 450, 90);

            // for (var i = 0; i < feat.length; i++) {
            //     var coord = turf.polygon(feat[i].geometry.coordinates);
            //     turf.transformTranslate(coord, 1, 90);
            // }
            return translatedPoly
        }

        // Load Mapbox Access Token
        var mapboxAccessToken = "pk.eyJ1IjoiMTkwMTg0OS1uYXRoYW5pZWwiLCJhIjoiY2w1c3hxbXA2MDBpZzNpcGQ5dzV1ZmM2YyJ9.eqDDBQoZwr8WrrlG8sTdww";

        // Declare map backdrop
        var map = L.map('map').setView([35.8, -96.9], 4);

        // var tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        //     maxZoom: 19,
        //     attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        // }).addTo(map);

        var tiles = L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=' + mapboxAccessToken, {
            id: 'mapbox/light-v9',
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            tileSize: 512,
            zoomOffset: -1,
            maxZoom: 19
        }).addTo(map);

        // Color Scale
        function getColorScale(d) {
            return d > 50 ? '#7A0177' :
                d > 45 ? '#C51B8A' :
                    d > 40 ? '#F768A1' :
                        d > 30 ? '#FA9FB5' :
                            d > 20 ? '#FCC5c0' :
                                '#FEEBE2';
        }

        // Fill Color to Cases
        function style(feature) {
            return {
                fillColor: getColorScale(feature.properties.cases),
                weight: 2,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.6
            };
        }

        var geojson;

        // Add Interaction Pop!
        function highlightFeature(e) {
            var layer = e.target;
            info.update(layer.feature.properties);

            layer.setStyle({
                weight: 4,
                color: 'skyblue',
                padding: '4px',
                fillOpacity: 0.6
            });


            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                layer.bringToFront();
            }
        }

        function resetHighlight(e) {
            geojson.resetStyle(e.target);
            info.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight,
            });
        }

        // Generate map
        geojson = L.geoJson(poly(USstates_hexbin_datapoints), {
            style: style,
            onEachFeature: onEachFeature,
        }).addTo(map);

        // Adding Tooltip
        var info = L.control();

        info.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info'); // create a div with a class "info"
            this.update();
            return this._div;
        };

        // method that we will use to update the control based on feature properties passed
        info.update = function (props) {
            this._div.innerHTML = '<h2>Covid 19 Statistics - Adjusted for Population</h2>' + (props ?
                '<b>' + props.google_name + '</b><br/>' + props.cases
                : 'Hover over a state');
        };

        info.addTo(map);

        // Add Legend
        var legend = L.control({ position: 'bottomright' });

        legend.onAdd = function (map) {

            var div = L.DomUtil.create('div', 'info legend'),
                grades = [0, 20, 30, 40, 45, 50],
                labels = ['<strong><center>Newcases in Jul 22</center></strong><strong>(Rate per 100k Pop.)</strong><br>'];

            // loop through our density intervals and generate a label with a colored square for each interval
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    labels.push('<center><i class="circle" style="background:' + getColorScale(grades[i] + 1) + '"></i> ' +
                        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br></center>' : '+'));
            }

            div.innerHTML = labels.join('<br>');
            return div;
        };

        legend.addTo(map);
    </script>

</body>

</html>
